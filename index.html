<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Systems — Наши работы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06090d;
    --bg-elevated: #0d1319;
    --line: #1c2733;
    --cyan: #4dd8e6;
    --cyan-bright: #7ff0fb;
    --text: #e7edf2;
    --text-dim: #7c8b98;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  /* тонкая неоновая сетка на фоне — фирменный приём Shine Systems */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(77, 216, 230, 0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77, 216, 230, 0.045) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 28px;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cyan);
  }

  h1 {
    margin: 0;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  header p {
    margin: 4px 0 0;
    color: var(--text-dim);
    font-size: 15px;
    max-width: 520px;
  }

  #status {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    padding: 40px 0;
    text-align: center;
  }

  #status.error { color: #ff8a8a; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .tile {
    position: relative;
    aspect-ratio: 4 / 3;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: var(--bg-elevated);
    cursor: zoom-in;
  }

  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease, filter 0.4s ease;
  }

  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 1px rgba(77, 216, 230, 0);
    transition: box-shadow 0.25s ease;
    pointer-events: none;
  }

  .tile:hover img {
    transform: scale(1.05);
    filter: saturate(1.15);
  }

  .tile:hover::after {
    box-shadow: inset 0 0 0 1px var(--cyan);
  }

  /* лайтбокс для просмотра фото крупно */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4, 7, 10, 0.92);
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(77, 216, 230, 0.15);
  }

  #lightbox .hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  footer {
    margin-top: 56px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce) {
    .tile img { transition: none; }
  }
</style>
</head>
<body>

<div class="page">
  <header>
    <span class="eyebrow">Shine Systems · Фотоотчёт</span>
    <h1>Наши работы</h1>
    <p>Свежие кадры до/после мойки и детейлинга. Обновляется по мере поступления новых машин.</p>
  </header>

  <div id="status">Загружаем фотографии…</div>
  <div class="grid" id="grid"></div>
</div>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="Фото крупно">
  <div class="hint">Нажмите в любом месте, чтобы закрыть</div>
</div>

<script>
  // ====== НАСТРОЙКА ======
  // Впишите сюда свой логин и название репозитория на GitHub.
  // Например, если ваш репозиторий: https://github.com/anton-shine/shine-photos
  // то GITHUB_OWNER = "anton-shine", GITHUB_REPO = "shine-photos"
  const GITHUB_OWNER = "DetailingWash69";
  const GITHUB_REPO = "Results";
  // Папка внутри репозитория, куда вы будете загружать фото
  const PHOTOS_FOLDER = "photos";
  // ========================

  const IMAGE_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];

  const statusEl = document.getElementById('status');
  const gridEl = document.getElementById('grid');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  function isImage(filename) {
    const lower = filename.toLowerCase();
    return IMAGE_EXTENSIONS.some(ext => lower.endsWith(ext));
  }

  async function loadPhotos() {
    if (GITHUB_OWNER.startsWith("ВСТАВЬТЕ") || GITHUB_REPO.startsWith("ВСТАВЬТЕ")) {
      statusEl.textContent = "Не настроено: впишите GITHUB_OWNER и GITHUB_REPO в начале файла.";
      statusEl.classList.add('error');
      return;
    }

    const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PHOTOS_FOLDER}`;

    try {
      const response = await fetch(apiUrl);
      if (!response.ok) {
        if (response.status === 404) {
          statusEl.textContent = `Папка «${PHOTOS_FOLDER}» пока пуста или не найдена. Загрузите туда первые фото.`;
        } else {
          statusEl.textContent = `Не удалось загрузить фото (ошибка ${response.status}). Попробуйте обновить страницу позже.`;
          statusEl.classList.add('error');
        }
        return;
      }

      const files = await response.json();
      const images = files
        .filter(f => f.type === 'file' && isImage(f.name))
        .sort((a, b) => b.name.localeCompare(a.name)); // новые (по имени) — сверху

      if (images.length === 0) {
        statusEl.textContent = "Фотографий пока нет — загрузите их в папку " + PHOTOS_FOLDER + " на GitHub.";
        return;
      }

      statusEl.style.display = 'none';

      images.forEach(file => {
        const tile = document.createElement('div');
        tile.className = 'tile';

        const img = document.createElement('img');
        img.src = file.download_url;
        img.alt = file.name;
        img.loading = 'lazy';

        tile.appendChild(img);
        tile.addEventListener('click', () => openLightbox(file.download_url));
        gridEl.appendChild(tile);
      });
    } catch (err) {
      statusEl.textContent = "Ошибка соединения. Проверьте интернет и обновите страницу.";
      statusEl.classList.add('error');
    }
  }

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
  }

  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  });

  loadPhotos();
</script>

</body>
</html>
